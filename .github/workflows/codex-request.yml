name: Codex request packaging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - exp
    paths:
      - ".codex/requests/*.md"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-request-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-request:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve request file
        id: request
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            REQUEST_FILE="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" | grep '^\.codex/requests/.*\.md$' | head -n 1)"
          else
            REQUEST_FILE="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^\.codex/requests/.*\.md$' | head -n 1)"
          fi

          if [ -z "${REQUEST_FILE:-}" ]; then
            echo "::error::No request file found in .codex/requests/ for this push"
            exit 1
          fi

          REQUEST_BASENAME="$(basename "$REQUEST_FILE" .md)"
          OUTBOX_FILE=".codex/outbox/${REQUEST_BASENAME}.prompt.md"

          echo "file=$REQUEST_FILE" >> "$GITHUB_OUTPUT"
          echo "basename=$REQUEST_BASENAME" >> "$GITHUB_OUTPUT"
          echo "outbox=$OUTBOX_FILE" >> "$GITHUB_OUTPUT"

      - name: Render standard prompt package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .codex/outbox

          cat > "${{ steps.request.outputs.outbox }}" <<'EOF'
          You are implementing a repository change request.

          Follow AGENTS.md instructions if present.
          Work only in the checked out repository.
          Make the requested code changes.
          Keep the change scoped and reviewable.
          If there are tests or checks documented in AGENTS.md, run the ones you can.
          Do not create a branch yourself.
          Do not open a PR yourself.
          Leave the workspace with the intended code changes present for GitHub Actions to commit.
          EOF

          echo "" >> "${{ steps.request.outputs.outbox }}"
          echo "## Request file" >> "${{ steps.request.outputs.outbox }}"
          echo '${{ steps.request.outputs.file }}' >> "${{ steps.request.outputs.outbox }}"
          echo "" >> "${{ steps.request.outputs.outbox }}"
          echo "## Request contents" >> "${{ steps.request.outputs.outbox }}"
          cat "${{ steps.request.outputs.file }}" >> "${{ steps.request.outputs.outbox }}"

          cp "${{ steps.request.outputs.outbox }}" .codex/outbox/LATEST.prompt.md

      - name: Create draft PR with packaged prompt
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex-request/${{ github.run_id }}-${{ github.run_attempt }}
          base: exp
          delete-branch: true
          draft: true
          commit-message: "Package Codex request from ${{ steps.request.outputs.file }}"
          title: "Codex request: ${{ steps.request.outputs.basename }}"
          body: |
            @codex action this request

            This PR packages a change request for Codex.

            No OpenAI API call was made by GitHub Actions.

            Source request:
            `${{ steps.request.outputs.file }}`

            Generated prompt files:
            - `${{ steps.request.outputs.outbox }}`
            - `.codex/outbox/LATEST.prompt.md`

            Recommended next step:
            - review the packaged prompt
            - invoke Codex manually using this PR or by pasting the prompt into Codex
