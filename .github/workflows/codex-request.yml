name: Codex change request

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - exp
    paths:
      - ".codex/requests/*.md"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-request-${{ github.ref }}
  cancel-in-progress: false

jobs:
  codex-request:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Preflight required secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::Missing required GitHub Actions secret OPENAI_API_KEY"
            exit 1
          fi

      - name: Resolve request file
        id: request
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            REQUEST_FILE="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" | grep '^\.codex/requests/.*\.md$' | head -n 1)"
          else
            REQUEST_FILE="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^\.codex/requests/.*\.md$' | head -n 1)"
          fi

          if [ -z "${REQUEST_FILE:-}" ]; then
            echo "::error::No request file found in .codex/requests/ for this push"
            exit 1
          fi

          echo "file=$REQUEST_FILE" >> "$GITHUB_OUTPUT"
          echo "Request file: $REQUEST_FILE"

      - name: Prepare prompt wrapper
        shell: bash
        run: |
          cat > .codex-runtime-prompt.md <<'EOF'
          You are implementing a repository change request.

          Follow AGENTS.md instructions if present.
          Work only in the checked out repository.
          Make the requested code changes.
          Keep the change scoped and reviewable.
          If there are tests or checks documented in AGENTS.md, run the ones you can.
          Do not create a branch yourself.
          Do not open a PR yourself.
          Leave the workspace with the intended code changes present for GitHub Actions to commit.
          EOF

          echo "" >> .codex-runtime-prompt.md
          echo "## Request file" >> .codex-runtime-prompt.md
          echo '${{ steps.request.outputs.file }}' >> .codex-runtime-prompt.md
          echo "" >> .codex-runtime-prompt.md
          echo "## Request contents" >> .codex-runtime-prompt.md
          cat "${{ steps.request.outputs.file }}" >> .codex-runtime-prompt.md

      - name: Preflight required secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::Missing required GitHub Actions secret OPENAI_API_KEY"
            exit 1
          fi

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex-runtime-prompt.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          effort: medium
          output-file: .codex-last-response.md

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/${{ github.run_id }}-${{ github.run_attempt }}
          base: exp
          delete-branch: true
          draft: true
          commit-message: "Codex: apply request from ${{ steps.request.outputs.file }}"
          title: "Codex: ${{ steps.request.outputs.file }}"
          body: |
            Automated change request execution.

            Source request:
            `${{ steps.request.outputs.file }}`

            Generated by:
            - GitHub Actions
            - openai/codex-action

            Review required before merge.
