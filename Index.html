<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #2B2B2B;
        color: #222;
      }

      /* Banner */
      .app-banner {
        width: 100%;
        height: 160px;
        overflow: hidden;
        background: #2f2618;
      }

      .app-banner-img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
      }

      /* Main layout */
      .wrap {
        width: 100%;
        max-width: 820px;
        margin: 0 auto;
        padding: 12px;
      }

      .card {
        background: #fff;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.12);
        margin-bottom: 14px;
      }

      h1, h2, h3 {
        margin: 0 0 12px;
        line-height: 1.15;
      }

      h1 {
        font-size: clamp(26px, 4vw, 34px);
      }

      h2 {
        font-size: clamp(22px, 3.2vw, 28px);
      }

      h3 {
        font-size: clamp(18px, 2.4vw, 22px);
      }

      /* Form */
      label {
        display: block;
        font-weight: 600;
        margin: 12px 0 6px;
        font-size: clamp(16px, 2vw, 20px);
      }

      input[type="date"] {
        width: 100%;
        padding: 14px 16px;
        min-height: 54px;
        font-size: clamp(18px, 2.1vw, 22px);
        border: 1px solid #ccc;
        border-radius: 10px;
        background: #fff;
      }

      button {
        padding: 14px 16px;
        min-height: 54px;
        font-size: clamp(18px, 2vw, 22px);
        border: 0;
        border-radius: 10px;
        cursor: pointer;
      }

      .full {
        width: 100%;
      }

      .primary {
        background: #111;
        color: #fff;
      }

      .secondary {
        background: #f0f0f0;
        color: #222;
      }

      .disabled {
        background: #d9d9d9;
        color: #777;
        cursor: not-allowed;
        opacity: 0.75;
      }

      .row {
        display: block;
      }

      .row > * {
        width: 100%;
        margin-bottom: 10px;
      }

      .row > *:last-child {
        margin-bottom: 0;
      }

      .stack > * + * {
        margin-top: 10px;
      }

      .muted {
        color: #666;
        font-size: clamp(15px, 1.8vw, 18px);
      }

      .hidden {
        display: none;
      }

      .msg {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 8px;
        font-size: clamp(15px, 1.8vw, 18px);
      }

      .ok {
        background: #e8f5e9;
      }

      .err {
        background: #ffebee;
      }

      .loading {
        opacity: 0.6;
        pointer-events: none;
      }

      .member {
        border: 1px solid #e6e6e6;
        border-radius: 12px;
        padding: 14px;
        margin-top: 12px;
      }

      .member-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .pill {
        display: inline-block;
        background: #f3f3f3;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: clamp(13px, 1.5vw, 16px);
        margin-top: 6px;
      }

      .charges {
        margin-top: 12px;
      }

      .charge {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 10px 0;
        border-top: 1px solid #f1f1f1;
      }

      .extras {
        margin-top: 14px;
      }

      .choice {
        display: block;
        background: #fff;
        border: 1px solid #ccc;
        width: 100%;
        text-align: left;
        margin-top: 10px;
        padding: 14px 16px;
        min-height: 52px;
        font-size: clamp(16px, 1.9vw, 20px);
        line-height: 1.3;
      }

      .danger {
        background: #fff3f3;
        border: 1px solid #f1b9b9;
      }

      .small {
        font-size: clamp(15px, 1.6vw, 18px);
        padding: 10px 12px;
        min-height: 44px;
      }

      .summary-box {
        background: #f8f8f8;
        border-radius: 10px;
        padding: 12px;
        margin-top: 12px;
        font-size: clamp(15px, 1.8vw, 18px);
      }

      .actions {
        margin-top: 14px;
      }

      .status-note {
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 10px;
        background: #f6f6f6;
        font-size: clamp(15px, 1.8vw, 18px);
      }

      .busy-wrap {
        position: sticky;
        top: 0;
        z-index: 20;
        margin-bottom: 12px;
      }

      .busy-card {
        background: rgba(255,255,255,0.96);
        border-radius: 12px;
        padding: 10px 12px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      }

      .busy-text {
        font-size: clamp(14px, 1.7vw, 17px);
        color: #222;
        margin-bottom: 8px;
      }

      .progress {
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: #e7e7e7;
      }

      .progress-bar {
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: #111;
        animation: indeterminate-slide 1.2s ease-in-out infinite;
      }

      @keyframes indeterminate-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(260%); }
      }

      @media (max-width: 900px) {
        .app-banner {
          height: 140px;
        }

        .wrap {
          max-width: none;
          padding: 10px;
        }

        .card {
          padding: 14px;
          border-radius: 12px;
        }

        .member-top {
          display: block;
        }

        .member-top > div:last-child {
          margin-top: 10px;
        }

        .charge {
          flex-direction: column;
          align-items: flex-start;
        }

        .charge > *:last-child {
          margin-top: 8px;
        }
      }

      @media (max-width: 480px) {
        .app-banner {
          height: 120px;
        }

        .wrap {
          padding: 8px;
        }

        .card {
          padding: 12px;
          margin-bottom: 12px;
        }

        .choice {
          padding: 12px 14px;
        }
      }
    </style>
  </head>
  <body>
    <? if (BANNER_URL) { ?>
      <div class="app-banner">
        <img class="app-banner-img" src="<?= BANNER_URL ?>" alt="">
      </div>
    <? } ?>

    <div class="wrap">


      <div id="busyWrap" class="busy-wrap hidden" aria-live="polite" aria-busy="true">
        <div class="busy-card">
          <div id="busyText" class="busy-text">Working…</div>
          <div class="progress"><div class="progress-bar"></div></div>
        </div>
      </div>


      <div class="card" id="app">
        <h1 id="entryTitle">Judo Sign-In</h1>


        <div class="row">
          <div>
            <label for="sessionDate">Session date</label>
            <input id="sessionDate" type="date">
          </div>
          <div>
            <label for="dob">Player date of birth</label>
            <input id="dob" type="date">
          </div>
        </div>


        <button class="primary full" onclick="lookupMembers()">Find player</button>
        <div id="lookupMsg" class="msg hidden"></div>


        <div id="choicesWrap" class="hidden">
          <h2 style="margin-top:16px;">Select player</h2>
          <div id="choices"></div>
        </div>
      </div>


      <div class="card hidden" id="basketCard">
        <h2>Current basket</h2>
        <div id="basketBody"></div>
        <div id="basketMsg" class="msg hidden"></div>
      </div>


      <div class="card hidden" id="paymentCard">
        <h2>Payment</h2>
        <div id="paymentBody"></div>
      </div>
    </div>


    <script>
      let currentBasketId = '';
      let currentMatches = [];
      let initialState = null;
      const INITIAL_ROUTE = <?!= INITIAL_ROUTE_JSON ?>;
      const MEMBERS_FORM_URL = <?!= MEMBERS_FORM_URL_JSON ?>;
      const DEBUG_CLIENT_PERF = false;
      let clientPerfSeq = 0;


      function clientPerfStart(label, extra) {
        const token = {
          id: ++clientPerfSeq,
          label,
          start: performance.now()
        };
        if (DEBUG_CLIENT_PERF) {
          console.log('[PERF][client][' + label + '] start', extra || '');
        }
        return token;
      }


      function clientPerfLog(token, step, extra) {
        if (!token || !DEBUG_CLIENT_PERF) return;
        const ms = (performance.now() - token.start).toFixed(1);
        console.log('[PERF][client][' + token.label + '] ' + step + ': ' + ms + 'ms', extra || '');
      }


      function setBusy(isBusy, text) {
        document.getElementById('app').classList.toggle('loading', isBusy);
        document.getElementById('basketCard').classList.toggle('loading', isBusy);
        const wrap = document.getElementById('busyWrap');
        const busyText = document.getElementById('busyText');
        if (text) busyText.textContent = text;
        wrap.classList.toggle('hidden', !isBusy);
      }


      function clearAllMessages() {
        hideMessage('lookupMsg');
        hideMessage('basketMsg');
      }


      function showMessage(id, text, ok) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + (ok ? 'ok' : 'err');
        el.classList.remove('hidden');
      }


      function hideMessage(id) {
        const el = document.getElementById(id);
        el.classList.add('hidden');
      }


      function ensureSessionDate() {
        const value = document.getElementById('sessionDate').value;
        if (!value) {
          showMessage('lookupMsg', 'Session date is required.', false);
          return '';
        }
        return value;
      }


      function resetChoiceArea() {
        currentMatches = [];
        document.getElementById('choices').innerHTML = '';
        document.getElementById('choicesWrap').classList.add('hidden');
      }


      function updateEntryTitle(hasActiveBasket) {
        document.getElementById('entryTitle').textContent = hasActiveBasket ? 'Add Additional Member' : 'Judo Sign-In';
      }


      function clearBasketUi() {
        currentBasketId = '';
        document.getElementById('basketBody').innerHTML = '';
        document.getElementById('basketCard').classList.add('hidden');
        hideMessage('basketMsg');
        updateEntryTitle(false);
      }


      function clearPaymentUi() {
        document.getElementById('paymentBody').innerHTML = '';
        document.getElementById('paymentCard').classList.add('hidden');
        setSignInCardVisible(true);
      }


      function openPaymentLink(url) {
        if (!url) return;
        window.location.assign(url);
      }


      function chooseDeskPayment(basketId) {
        if (!basketId) {
          clearPaymentUi();
          return;
        }

        setBusy(true, 'Setting payment to desk…');
        google.script.run
          .withSuccessHandler(result => {
            setBusy(false);
            clearPaymentUi();
            showMessage('lookupMsg', (result && result.message) || 'Payment marked as desk payment.', true);
            document.getElementById('dob').focus();
          })
          .withFailureHandler(err => {
            setBusy(false);
            showMessage('lookupMsg', err && err.message ? err.message : 'Could not switch payment to desk.', false);
          })
          .markBasketPendingAsDeskPayment(basketId);
      }


      function setSignInCardVisible(isVisible) {
        document.getElementById('app').classList.toggle('hidden', !isVisible);
      }


      function renderPaymentPrompt(message, payment) {
        const card = document.getElementById('paymentCard');
        const body = document.getElementById('paymentBody');


        let html = '';
        html += '<div class="summary-box">';
        html += '<div>' + escapeHtml(message || 'Sign-in completed. Payment is still pending.') + '</div>';
        html += '<div style="margin-top:8px;"><strong>Basket:</strong> ' + escapeHtml(payment.basketId || '') + '</div>';
        html += '<div><strong>Total:</strong> ' + escapeHtml(payment.formattedAmount || '') + '</div>';
        html += '</div>';


        html += '<div class="actions stack">';
        html += '<button class="primary full" onclick="openPaymentLink(\'' + escapeJs(payment.paymentLinkUrl || '') + '\')">Pay online</button>';
        html += '<button class="secondary full" onclick="chooseDeskPayment(\'' + escapeJs(payment.basketId || '') + '\')">Pay at Desk</button>';
        html += '</div>';


        html += '<div class="status-note">';
        html += 'Attendance has already been recorded. After checkout, Square will return you here and the payment status will update automatically.';
        html += '</div>';


        body.innerHTML = html;
        setSignInCardVisible(false);
        card.classList.remove('hidden');
      }


      function renderPaymentReturnStatus(result) {
        const card = document.getElementById('paymentCard');
        const body = document.getElementById('paymentBody');


        let html = '';
        html += '<div class="summary-box">';


        if (result && result.isPaid) {
          html += '<div><strong>Payment confirmed.</strong></div>';
        } else {
          html += '<div><strong>Payment still pending.</strong></div>';
        }


        html += '<div style="margin-top:8px;"><strong>Basket:</strong> ' + escapeHtml(result && result.basketId ? result.basketId : '') + '</div>';
        html += '</div>';


        html += '<div class="actions stack">';
        html += '<button class="secondary full" onclick="clearPaymentUi()">Close</button>';
        html += '</div>';


        html += '<div class="status-note">';
        if (result && result.isPaid) {
          html += 'Your payment has been received and the attendance record has been updated.';
        } else {
          html += 'Your attendance is already recorded. If payment does not settle, the desk can still take a manual payment and mark it as paid.';
        }
        html += '</div>';


        body.innerHTML = html;
        setSignInCardVisible(false);
        card.classList.remove('hidden');
      }


      function checkReturnFromSquare() {
        if (!INITIAL_ROUTE || INITIAL_ROUTE.returnFrom !== 'square' || !INITIAL_ROUTE.basketId) {
          return;
        }


        setSignInCardVisible(false);
        clearAllMessages();
        clearBasketUi();
        resetChoiceArea();
        setBusy(true, 'Checking payment status…');


        google.script.run
          .withSuccessHandler(result => {
            setBusy(false);
            renderPaymentReturnStatus(result);
          })
          .withFailureHandler(err => {
            setBusy(false);
            setSignInCardVisible(true);
            showMessage(
              'lookupMsg',
              err && err.message ? err.message : 'Could not check payment status.',
              false
            );
          })
          .checkBasketPaymentStatus(INITIAL_ROUTE.basketId);
      }


      function lookupMembers() {
        clearAllMessages();
        clearPaymentUi();
        resetChoiceArea();


        const sessionDate = ensureSessionDate();
        if (!sessionDate) return;


        const dob = document.getElementById('dob').value;
        if (!dob) {
          showMessage('lookupMsg', 'Enter a date of birth.', false);
          return;
        }


        const perf = clientPerfStart('lookupMembers', { dob, sessionDate });
        setBusy(true, 'Finding player…');
        clientPerfLog(perf, 'before google.script.run');


        google.script.run
          .withSuccessHandler(matches => {
            clientPerfLog(perf, 'success callback', { matchCount: (matches && matches.length) || 0 });
            setBusy(false);


            if (!matches || !matches.length) {
              showMessage('lookupMsg', 'No active member found for that date of birth.', false);
              renderNoMemberFoundActions();
              clientPerfLog(perf, 'ui updated no matches');
              return;
            }


            currentMatches = matches;
            const renderStart = performance.now();
            renderChoiceButtons(matches);
            if (DEBUG_CLIENT_PERF) {
              console.log('[PERF][client][lookupMembers] renderChoiceButtons: ' + (performance.now() - renderStart).toFixed(1) + 'ms', { matchCount: matches.length });
            }
            clientPerfLog(perf, 'ui updated matches shown');
          })
          .withFailureHandler(err => {
            setBusy(false);
            clientPerfLog(perf, 'failure callback', { message: err && err.message ? err.message : 'Lookup failed.' });
            showMessage('lookupMsg', err && err.message ? err.message : 'Lookup failed.', false);
          })
          .findMembersByDob(dob, sessionDate);
      }


      function renderChoiceButtons(matches) {
        const container = document.getElementById('choices');
        container.innerHTML = '';


        matches.forEach(match => {
          const btn = document.createElement('button');
          btn.className = 'choice';
          btn.innerHTML =
            '<strong>' + escapeHtml(match.initials) + '</strong><br>' +
            '<span class="muted">' +
            escapeHtml(match.sessionName || 'No session') + ' · ' +
            escapeHtml(match.paymentStatusLabel || '') +
            '</span>';
          btn.onclick = () => addMember(match.memberRow);
          container.appendChild(btn);
        });


        document.getElementById('choicesWrap').classList.remove('hidden');
      }

      function renderNoMemberFoundActions() {
        if (!MEMBERS_FORM_URL) return;

        const container = document.getElementById('choices');
        container.innerHTML = '';

        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerHTML =
          '<strong>Add member details</strong><br>' +
          '<span class="muted">Open the membership form in a new tab</span>';
        btn.onclick = () => window.open(MEMBERS_FORM_URL, '_blank', 'noopener');
        container.appendChild(btn);

        document.getElementById('choicesWrap').classList.remove('hidden');
      }


      function addMember(memberRow) {
        clearAllMessages();


        const sessionDate = ensureSessionDate();
        if (!sessionDate) return;


        resetChoiceArea();
        hideMessage('lookupMsg');
        updateEntryTitle(!!currentBasketId);


        const perf = clientPerfStart('addMember', {
          basketId: currentBasketId || 'NEW',
          memberRow,
          sessionDate
        });


        setBusy(true, 'Adding player to basket…');
        clientPerfLog(perf, 'before google.script.run');


        google.script.run
          .withSuccessHandler(result => {
            clientPerfLog(perf, 'success callback', {
              returnedBasketId: result && result.basketId ? result.basketId : '',
              hasBasket: !!(result && result.basket)
            });
            setBusy(false);


            if (result && result.basketId) currentBasketId = result.basketId;


            if (result && typeof result.basket !== 'undefined') {
              const renderStart = performance.now();
              renderBasket(result.basket);
              if (DEBUG_CLIENT_PERF) {
                console.log('[PERF][client][addMember] renderBasket: ' + (performance.now() - renderStart).toFixed(1) + 'ms', {
                  basketId: currentBasketId,
                  memberCount: result && result.basket ? result.basket.memberCount : 0
                });
              }
            }


            const targetId = result && result.messageTarget === 'lookup'
              ? 'lookupMsg'
              : (result && result.basket ? 'basketMsg' : 'lookupMsg');
            const isOk = !(result && result.noticeType === 'error');
            showMessage(targetId, (result && result.message) ? result.message : 'Member added.', isOk);


            if (result && result.outcome === 'added') {
              resetChoiceArea();
              hideMessage('lookupMsg');
              document.getElementById('dob').value = '';
              document.getElementById('dob').focus();
              updateEntryTitle(true);
            }


            clientPerfLog(perf, 'ui updated', {
              basketId: currentBasketId,
              memberCount: result && result.basket ? result.basket.memberCount : 0,
              outcome: result && result.outcome ? result.outcome : ''
            });
          })
          .withFailureHandler(err => {
            setBusy(false);
            clientPerfLog(perf, 'failure callback', { message: err && err.message ? err.message : 'Could not add member.' });
            showMessage(currentBasketId ? 'basketMsg' : 'lookupMsg', err && err.message ? err.message : 'Could not add member.', false);
          })
          .addMemberToBasket(currentBasketId, memberRow, sessionDate);
      }


      function addExtra(memberKey, optionCode) {
        hideMessage('basketMsg');
        setBusy(true, 'Adding extra payment…');


        google.script.run
          .withSuccessHandler(result => {
            setBusy(false);
            renderBasket(result.basket);
            showMessage('basketMsg', result.message || 'Charge added.', true);
          })
          .withFailureHandler(err => {
            setBusy(false);
            showMessage('basketMsg', err && err.message ? err.message : 'Could not add extra.', false);
          })
          .addExtraToBasket(currentBasketId, memberKey, optionCode);
      }


      function removeMember(memberKey) {
        hideMessage('basketMsg');
        setBusy(true, 'Removing member…');


        google.script.run
          .withSuccessHandler(result => {
            setBusy(false);
            renderBasket(result.basket);
            showMessage('basketMsg', result.message || 'Member removed.', true);
          })
          .withFailureHandler(err => {
            setBusy(false);
            showMessage('basketMsg', err && err.message ? err.message : 'Could not remove member.', false);
          })
          .removeMemberFromBasket(currentBasketId, memberKey);
      }


      function removeCharge(lineId) {
        hideMessage('basketMsg');
        setBusy(true, 'Removing charge…');


        google.script.run
          .withSuccessHandler(result => {
            setBusy(false);
            renderBasket(result.basket);
            showMessage('basketMsg', result.message || 'Charge removed.', true);
          })
          .withFailureHandler(err => {
            setBusy(false);
            showMessage('basketMsg', err && err.message ? err.message : 'Could not remove charge.', false);
          })
          .removeBasketLine(currentBasketId, lineId);
      }


      function cancelBasket() {
        if (!currentBasketId) {
          clearBasketUi();
          return;
        }


        hideMessage('basketMsg');
        setBusy(true, 'Cancelling basket…');


        google.script.run
          .withSuccessHandler(() => {
            setBusy(false);
            clearBasketUi();
            resetChoiceArea();
            showMessage('lookupMsg', 'Basket cancelled.', true);
            document.getElementById('dob').focus();
          })
          .withFailureHandler(err => {
            setBusy(false);
            showMessage('basketMsg', err && err.message ? err.message : 'Could not cancel basket.', false);
          })
          .cancelBasket(currentBasketId);
      }


      function finaliseSignIn() {
        hideMessage('basketMsg');
        clearPaymentUi();
        setBusy(true, 'Completing sign-in…');


        google.script.run
          .withSuccessHandler(result => {
            if (result && result.paymentPending) {
              google.script.run
                .withSuccessHandler(payment => {
                  setBusy(false);
                  clearBasketUi();
                  resetChoiceArea();
                  document.getElementById('dob').value = '';
                  hideMessage('lookupMsg');
                  renderPaymentPrompt(result.message || 'Sign-in completed. Payment is still pending.', payment);
                  document.getElementById('dob').focus();
                })
                .withFailureHandler(err => {
                  setBusy(false);
                  clearBasketUi();
                  resetChoiceArea();
                  document.getElementById('dob').value = '';
                  showMessage(
                    'lookupMsg',
                    (result.message || 'Sign-in completed.') + ' Payment link could not be created: ' + (err && err.message ? err.message : 'Unknown error.'),
                    false
                  );
                  document.getElementById('dob').focus();
                })
                .createBasketPaymentLink(result.basketId);
              return;
            }


            setBusy(false);
            clearBasketUi();
            resetChoiceArea();
            document.getElementById('dob').value = '';
            showMessage('lookupMsg', result.message || 'Sign-in completed.', true);
            document.getElementById('dob').focus();
          })
          .withFailureHandler(err => {
            setBusy(false);
            showMessage('basketMsg', err && err.message ? err.message : 'Could not complete sign-in.', false);
          })
          .finaliseBasketDesk(currentBasketId);
      }


      function renderBasket(basket) {
        const card = document.getElementById('basketCard');
        const body = document.getElementById('basketBody');


        if (!basket || !basket.members || !basket.members.length) {
          card.classList.add('hidden');
          body.innerHTML = '';
          updateEntryTitle(false);
          return;
        }


        currentBasketId = basket.basketId;
        card.classList.remove('hidden');
        updateEntryTitle(true);


        let html = '';
        html += '<div class="summary-box">';
        html += '<div><strong>Session date:</strong> ' + escapeHtml(basket.sessionDate) + '</div>';
        html += '<div><strong>Members:</strong> ' + basket.memberCount + '</div>';
        html += '<div><strong>Total:</strong> ' + escapeHtml(basket.formattedTotal) + '</div>';
        html += '<div><strong>Status:</strong> ' + escapeHtml(basket.status || '') + '</div>';
        html += '</div>';


        if (basket.hasChargeLines) {
          html += '<div class="status-note">';
          html += 'Sign-in will be recorded immediately. Payment can be resolved afterwards.';
          html += '</div>';
        }


        basket.members.forEach(member => {
          html += '<div class="member">';
          html += '<div class="member-top">';
          html += '<div>';
          html += '<h3>' + escapeHtml(member.initials) + '</h3>';
          html += '<div class="muted">' + escapeHtml(member.sessionName || '') + '</div>';
          html += '<div class="pill">' + escapeHtml(member.paymentStatusLabel || '') + '</div>';
          html += '</div>';
          html += '<div><button class="secondary small danger" onclick="removeMember(\'' + escapeJs(member.memberKey) + '\')">Remove</button></div>';
          html += '</div>';


          if (member.lines && member.lines.length) {
            html += '<div class="charges">';
            member.lines.forEach(line => {
              html += '<div class="charge">';
              html += '<div><strong>' + escapeHtml(line.description) + '</strong><br><span class="muted">' + escapeHtml(line.formattedAmount) + '</span></div>';
              if (line.lineType === 'SESSION_CHARGE') {
                html += '<div class="muted">Session</div>';
              } else {
                html += '<button class="secondary small" onclick="removeCharge(\'' + escapeJs(line.lineId) + '\')">Remove</button>';
              }
              html += '</div>';
            });
            html += '</div>';
          }


          if (member.availableExtras && member.availableExtras.length) {
            html += '<div class="extras">';
            html += '<div class="muted" style="margin-bottom:8px;">Add extra payment</div>';
            member.availableExtras.forEach(extra => {
              html += '<button class="choice small" onclick="addExtra(\'' + escapeJs(member.memberKey) + '\', \'' + escapeJs(extra.code) + '\')">' +
                escapeHtml(extra.label) + ' · ' + escapeHtml(extra.formattedAmount) +
              '</button>';
            });
            html += '</div>';
          }


          html += '</div>';
        });


        html += '<div class="actions stack">';
        html += '<button class="primary full" onclick="finaliseSignIn()">Complete sign-in</button>';
        html += '<button class="secondary full" onclick="cancelBasket()">Cancel basket</button>';
        html += '</div>';


        body.innerHTML = html;
      }


      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }


      function escapeJs(value) {
        return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      }


      function backgroundPrewarm(sessionDate) {
        if (!sessionDate) return;
        const perf = clientPerfStart('prewarmSession', 'date=' + sessionDate);
        window.setTimeout(() => {
          clientPerfLog(perf, 'before google.script.run', 'date=' + sessionDate);
          google.script.run
            .withSuccessHandler(() => {
              clientPerfLog(perf, 'success callback', 'date=' + sessionDate);
            })
            .withFailureHandler(err => {
              clientPerfLog(perf, 'failure callback', (err && err.message) ? err.message : String(err || 'Unknown error'));
            })
            .prewarmSession(sessionDate);
        }, 0);
      }


      function init() {
        setBusy(true, 'Preparing sign-in…');
        google.script.run
          .withSuccessHandler(state => {
            initialState = state || {};
            setBusy(false);
            document.getElementById('sessionDate').value = initialState.today || '';
            document.getElementById('dob').focus();
            backgroundPrewarm(initialState.today || '');
            checkReturnFromSquare();
          })
          .withFailureHandler(err => {
            setBusy(false);
            showMessage('lookupMsg', err && err.message ? err.message : 'Initial load failed.', false);
          })
          .getInitialState();
      }


      init();
    </script>
  </body>
</html>
