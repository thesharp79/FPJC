<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; font-size: 13px; margin: 16px; }
      h2 { margin: 0 0 12px; font-size: 18px; }
      .row { margin-bottom: 10px; }
      label { display: block; font-weight: 600; margin-bottom: 4px; }
      input, textarea { width: 100%; box-sizing: border-box; padding: 6px; }
      textarea { min-height: 64px; }
      .actions { margin-top: 14px; display: flex; gap: 8px; }
      .muted { color: #555; white-space: pre-wrap; }
      .hidden { display: none; }
      .ok { color: #0b8043; }
      .err { color: #b00020; }
    </style>
  </head>
  <body>
    <h2 id="title">Settings</h2>
    <div id="status" class="muted"></div>

    <div id="club-panel" class="hidden">
      <div class="row"><label>club_name</label><input id="club_name"></div>
      <div class="row"><label>banner_url</label><input id="banner_url"></div>
      <div class="row"><label>session_names_json</label><textarea id="session_names_json"></textarea></div>
      <div class="row"><label>feature_flags_json</label><textarea id="feature_flags_json"></textarea></div>
    </div>

    <div id="square-panel" class="hidden">
      <div class="row"><label>SPREADSHEET_ID</label><input id="SPREADSHEET_ID"></div>
      <div class="row"><label>SQUARE_BASE_URL</label><input id="SQUARE_BASE_URL"></div>
      <div class="row"><label>SQUARE_APPLICATION_ID</label><input id="SQUARE_APPLICATION_ID"></div>
      <div class="row"><label>SQUARE_ACCESS_TOKEN</label><input id="SQUARE_ACCESS_TOKEN" type="password"></div>
      <div class="row"><label>SQUARE_LOCATION_ID</label><input id="SQUARE_LOCATION_ID"></div>
      <div class="row"><label>SQUARE_VERSION</label><input id="SQUARE_VERSION"></div>
      <div class="row"><label>SQUARE_CURRENCY</label><input id="SQUARE_CURRENCY"></div>
      <div class="row"><label>SQUARE_SYNC_ROOT_CATEGORY_ID (optional)</label><input id="SQUARE_SYNC_ROOT_CATEGORY_ID"></div>
      <div class="row"><label>SQUARE_SYNC_ROOT_CATEGORY_NAME (optional)</label><input id="SQUARE_SYNC_ROOT_CATEGORY_NAME"></div>
      <div class="row"><label>ENABLE_SUPPORT_MENU (optional)</label><input id="ENABLE_SUPPORT_MENU"></div>
    </div>

    <div class="actions">
      <button onclick="save()">Save</button>
      <button onclick="validateConfig()">Validate configuration</button>
      <button onclick="google.script.host.close()">Close</button>
    </div>

    <script>
      const mode = '<?= mode ?>' || 'club';

      function setStatus(message, isError) {
        const node = document.getElementById('status');
        node.className = isError ? 'muted err' : 'muted ok';
        node.textContent = message;
      }

      function populate(data) {
        document.getElementById('title').textContent = mode === 'square' ? 'Square/runtime settings' : 'Club settings';
        document.getElementById('club-panel').classList.toggle('hidden', mode !== 'club');
        document.getElementById('square-panel').classList.toggle('hidden', mode !== 'square');

        if (data.clubConfig) {
          ['club_name', 'banner_url', 'session_names_json', 'feature_flags_json'].forEach((key) => {
            const node = document.getElementById(key);
            if (node) node.value = data.clubConfig[key] || '';
          });
        }

        if (data.scriptProperties) {
          [
            'SPREADSHEET_ID','SQUARE_BASE_URL','SQUARE_APPLICATION_ID','SQUARE_ACCESS_TOKEN',
            'SQUARE_LOCATION_ID','SQUARE_VERSION','SQUARE_CURRENCY',
            'SQUARE_SYNC_ROOT_CATEGORY_ID','SQUARE_SYNC_ROOT_CATEGORY_NAME',
            'ENABLE_SUPPORT_MENU'
          ].forEach((key) => {
            const node = document.getElementById(key);
            if (node) node.value = data.scriptProperties[key] || '';
          });
        }

        const val = data.validation || { ok: false, errors: [], warnings: [], checkedAt: '', schemaVersion: '' };
        setStatus(
          (val.ok ? 'Validation: OK' : 'Validation: issues found') +
            (val.checkedAt ? '\nChecked at: ' + val.checkedAt : '') +
            ('\nSchema version: ' + (val.schemaVersion || '(not set)')) +
            (val.errors.length ? '\nBlocking errors: ' + val.errors.join('; ') : '') +
            (val.warnings.length ? '\nWarnings: ' + val.warnings.join('; ') : ''),
          !val.ok
        );
      }

      function load() {
        google.script.run
          .withSuccessHandler(populate)
          .withFailureHandler((err) => setStatus(String(err.message || err), true))
          .getAdminSettingsData(mode);
      }

      function save() {
        if (mode === 'club') {
          const payload = {
            club_name: document.getElementById('club_name').value,
            banner_url: document.getElementById('banner_url').value,
            session_names_json: document.getElementById('session_names_json').value,
            feature_flags_json: document.getElementById('feature_flags_json').value
          };
          google.script.run
            .withSuccessHandler((data) => {
              setStatus('Club settings saved.', false);
              populate(data);
            })
            .withFailureHandler((err) => setStatus('Save failed: ' + String(err.message || err), true))
            .saveClubSettings(payload);
          return;
        }

        const payload = {
          SPREADSHEET_ID: document.getElementById('SPREADSHEET_ID').value,
          SQUARE_BASE_URL: document.getElementById('SQUARE_BASE_URL').value,
          SQUARE_APPLICATION_ID: document.getElementById('SQUARE_APPLICATION_ID').value,
          SQUARE_ACCESS_TOKEN: document.getElementById('SQUARE_ACCESS_TOKEN').value,
          SQUARE_LOCATION_ID: document.getElementById('SQUARE_LOCATION_ID').value,
          SQUARE_VERSION: document.getElementById('SQUARE_VERSION').value,
          SQUARE_CURRENCY: document.getElementById('SQUARE_CURRENCY').value,
          SQUARE_SYNC_ROOT_CATEGORY_ID: document.getElementById('SQUARE_SYNC_ROOT_CATEGORY_ID').value,
          SQUARE_SYNC_ROOT_CATEGORY_NAME: document.getElementById('SQUARE_SYNC_ROOT_CATEGORY_NAME').value,
          ENABLE_SUPPORT_MENU: document.getElementById('ENABLE_SUPPORT_MENU').value
        };

        google.script.run
          .withSuccessHandler((data) => {
            setStatus('Square/runtime settings saved.', false);
            populate(data);
          })
          .withFailureHandler((err) => setStatus('Save failed: ' + String(err.message || err), true))
          .saveSquareSettings(payload);
      }

      function validateConfig() {
        google.script.run
          .withSuccessHandler((result) => {
            const msg = (result.ok ? 'Validation: OK' : 'Validation: issues found') +
              (result.checkedAt ? '\nChecked at: ' + result.checkedAt : '') +
              ('\nSchema version: ' + (result.schemaVersion || '(not set)')) +
              (result.errors.length ? '\nBlocking errors: ' + result.errors.join('; ') : '') +
              (result.warnings.length ? '\nWarnings: ' + result.warnings.join('; ') : '');
            setStatus(msg, !result.ok);
          })
          .withFailureHandler((err) => setStatus('Validation failed: ' + String(err.message || err), true))
          .runConfigurationValidation();
      }

      load();
    </script>
  </body>
</html>
